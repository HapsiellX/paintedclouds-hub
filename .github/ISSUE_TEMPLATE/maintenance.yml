name: Maintenance task
description: Track build, dependency, release, refactor, or infrastructure work
title: "[Chore]: "
labels: ["maintenance", "awaiting triage"]
type: task
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CI and release supply chain
        - Build and packaging
        - Dependencies
        - Upstream synchronization
        - Refactor or technical debt
        - Documentation and governance
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary and rationale
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: textarea
    id: risk
    attributes:
      label: Risk and validation
      description: Include security, migration, release, or upstream implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and private data and agree to follow CODE_OF_CONDUCT.md.
          required: true
