name: Feature request
description: Propose a StefARR improvement
title: "[Feature]: "
labels: ["awaiting triage"]
type: feature
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem before proposing an implementation. Roadmap discussion does not promise delivery.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who has this problem, and what cannot they do today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior and important accessibility or privacy needs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Integrations and risks
      description: Identify external services, new data flows, credentials, migrations, or compatibility concerns.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and ROADMAP.md.
          required: true
        - label: This request does not ask for assistance obtaining infringing content or bypassing access controls.
          required: true
        - label: I agree to follow CODE_OF_CONDUCT.md.
          required: true
