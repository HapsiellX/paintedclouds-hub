name: Bug report
description: Report a reproducible StefARR defect
title: "[Bug]: "
labels: ["awaiting triage"]
type: bug
body:
  - type: markdown
    attributes:
      value: |
        StefARR by PaintedClouds is independent from Seerr. Report fork-specific bugs here.
        Do not include API keys, cookies, webhook URLs, private addresses, or personal data.
        Security vulnerabilities must use the private process in SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version and digest
      description: Exact StefARR version, commit, and container digest when available.
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite
        - PostgreSQL
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Installation method, CPU architecture, operating system, and browser if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure a sanitized test instance with ...
        2. Open ...
        3. Select ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: integrations
    attributes:
      label: Affected integrations
      description: Name and sanitized version of each relevant downstream service.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Include only relevant lines after removing secrets and private data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reproduced this on the newest supported StefARR release.
          required: true
        - label: I searched open and closed issues for duplicates.
          required: true
        - label: I removed secrets and private data and agree to follow CODE_OF_CONDUCT.md.
          required: true
