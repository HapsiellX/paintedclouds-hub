name: Documentation issue
description: Report missing, incorrect, unsafe, or unclear documentation
title: "[Docs]: "
labels: ["documentation", "awaiting triage"]
type: task
body:
  - type: input
    id: location
    attributes:
      label: Document and section
      description: Repository path, heading, or public page URL.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong, outdated, unsafe, or missing?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      description: Include sources when correcting security, legal, provider, or compatibility claims.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed private data and agree to follow CODE_OF_CONDUCT.md.
          required: true
