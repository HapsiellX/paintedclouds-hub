---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Promote Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing signed tag, for example v0.2.0-rc.1 or v0.2.0
        required: true
        type: string
      candidate_sha:
        description: Full commit SHA used by the successful candidate workflow
        required: true
        type: string
      candidate_digest:
        description: Multi-arch candidate digest, including sha256 prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: promote-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  promote:
    name: Verify and publish release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository history and tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate immutable release inputs
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
        run: |
          if [[ ! "$VERSION" =~ ^v0\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo 'Only v0.x.y and v0.x.y-alpha.n, beta.n, or rc.n versions are allowed' >&2
            exit 1
          fi
          if [[ ! "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'candidate_sha must be a full lowercase Git SHA' >&2
            exit 1
          fi
          if [[ ! "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo 'candidate_digest must be a sha256 digest' >&2
            exit 1
          fi
          tag_ref=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION" \
            --jq '[.object.type, .object.sha] | @tsv')
          read -r tag_type tag_object <<< "$tag_ref"
          if [[ "$tag_type" != tag ]]; then
            echo 'Release tag must be annotated, not lightweight' >&2
            exit 1
          fi
          if [[ "$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.verified')" != true ]]; then
            echo 'GitHub did not verify the release tag signature' >&2
            exit 1
          fi
          tag_type=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.object.type')
          tag_sha=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.object.sha')
          if [[ "$tag_type" != commit ]]; then
            echo 'Release tag must point directly to a commit' >&2
            exit 1
          fi
          if [[ "$tag_sha" != "$CANDIDATE_SHA" ]]; then
            echo "Tag resolves to $tag_sha, not candidate $CANDIDATE_SHA" >&2
            exit 1
          fi
          git merge-base --is-ancestor "$CANDIDATE_SHA" origin/main
          package_version=$(git show "$CANDIDATE_SHA:package.json" | node -e \
            "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))")
          if [[ "$package_version" != "${VERSION#v}" ]]; then
            echo "package.json version $package_version does not match ${VERSION#v}" >&2
            exit 1
          fi
          echo "image_version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${CANDIDATE_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-alpha.* ]]; then
            echo 'channel=alpha' >> "$GITHUB_OUTPUT"
            echo 'prerelease=true' >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta.* ]]; then
            echo 'channel=beta' >> "$GITHUB_OUTPUT"
            echo 'prerelease=true' >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-rc.* ]]; then
            echo 'channel=rc' >> "$GITHUB_OUTPUT"
            echo 'prerelease=true' >> "$GITHUB_OUTPUT"
          else
            echo 'channel=stable' >> "$GITHUB_OUTPUT"
            echo 'prerelease=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Require candidate tag to resolve to approved digest
        shell: bash
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          actual=$(docker buildx imagetools inspect "$IMAGE:candidate-$SHORT_SHA" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          if [[ "$actual" != "$CANDIDATE_DIGEST" ]]; then
            echo "Candidate tag resolves to $actual, expected $CANDIDATE_DIGEST" >&2
            exit 1
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify candidate signature and SBOM attestation
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
        run: |
          identity="https://github.com/${{ github.repository }}/.github/workflows/release-candidate.yml@refs/heads/main"
          issuer='https://token.actions.githubusercontent.com'
          cosign verify "$IMAGE@$CANDIDATE_DIGEST" \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer"
          cosign verify-attestation "$IMAGE@$CANDIDATE_DIGEST" \
            --type cyclonedx \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" >/dev/null

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.72.0

      - name: Re-scan immutable candidate and generate release SBOM
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
        run: |
          trivy image --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL \
            "$IMAGE@$CANDIDATE_DIGEST"
          trivy image --format cyclonedx --output stefarr.cdx.json \
            "$IMAGE@$CANDIDATE_DIGEST"

      - name: Promote exact digest to version and release channel
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          IMAGE_VERSION: ${{ steps.release.outputs.image_version }}
          RELEASE_CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$IMAGE_VERSION" \
            --tag "$IMAGE:$RELEASE_CHANNEL" \
            "$IMAGE@$CANDIDATE_DIGEST"
          promoted=$(docker buildx imagetools inspect "$IMAGE:$IMAGE_VERSION" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          test "$promoted" = "$CANDIDATE_DIGEST"

      - name: Publish GitHub release
        shell: bash
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          IMAGE_VERSION: ${{ steps.release.outputs.image_version }}
          IS_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Container: \`$IMAGE:$IMAGE_VERSION\`

          Immutable digest: \`$IMAGE@$CANDIDATE_DIGEST\`

          StefARR source commit: \`$CANDIDATE_SHA\`

          Upstream basis: Seerr \`v3.3.0\` at
          \`703faf95f454ffecae99a5e86ea761b3b524c6df\`.

          StefARR by PaintedClouds is an independent MIT-licensed fork of Seerr.
          It is not affiliated with, endorsed by, or supported by Seerr or its
          maintainers. The original notices are retained in LICENSE and
          ATTRIBUTION.md.

          Verify the keyless signature:

          \`\`\`sh
          cosign verify '$IMAGE@$CANDIDATE_DIGEST' \\
            --certificate-identity 'https://github.com/${{ github.repository }}/.github/workflows/release-candidate.yml@refs/heads/main' \\
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
          \`\`\`

          Back up the configuration directory and database before upgrading.
          EOF
          release_flags=()
          if [[ "$IS_PRERELEASE" == true ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi
          gh release create "$VERSION" stefarr.cdx.json \
            --verify-tag \
            "${release_flags[@]}" \
            --title "StefARR by PaintedClouds $VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
