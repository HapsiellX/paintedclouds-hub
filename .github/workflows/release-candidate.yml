---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Prerelease version, for example v0.1.0-alpha.1
        required: true
        type: string
      candidate_sha:
        description: Full commit SHA from the protected main branch
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.candidate_sha }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  authorize:
    name: Validate candidate source
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.source.outputs.sha }}
      short_sha: ${{ steps.source.outputs.short_sha }}
      epoch: ${{ steps.source.outputs.epoch }}
      date: ${{ steps.source.outputs.date }}
      version: ${{ steps.source.outputs.version }}
    steps:
      - name: Checkout repository history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require an exact SHA reachable from main
        id: source
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.candidate_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v0\.[0-9]+\.[0-9]+-(alpha|beta)\.[0-9]+$ ]]; then
            echo 'Only v0.x.y-alpha.n and v0.x.y-beta.n prereleases are allowed' >&2
            exit 1
          fi
          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'candidate_sha must be a full lowercase Git SHA' >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git cat-file -e "${REQUESTED_SHA}^{commit}"
          git merge-base --is-ancestor "$REQUESTED_SHA" origin/main
          package_version=$(git show "$REQUESTED_SHA:package.json" | node -e \
            "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))")
          if [[ "$package_version" != "${VERSION#v}" ]]; then
            echo "package.json version $package_version does not match ${VERSION#v}" >&2
            exit 1
          fi
          echo "sha=$REQUESTED_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${REQUESTED_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "epoch=$(git show -s --format=%ct "$REQUESTED_SHA")" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI "$REQUESTED_SHA")" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and smoke-test (${{ matrix.arch }})
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout authorized candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.authorize.outputs.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push canonical platform digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            COMMIT_TAG=${{ needs.authorize.outputs.sha }}
            BUILD_VERSION=${{ needs.authorize.outputs.version }}
            BUILD_DATE=${{ needs.authorize.outputs.date }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
            SOURCE_DATE_EPOCH=${{ needs.authorize.outputs.epoch }}
          cache-from: type=gha,scope=candidate-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=candidate-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Smoke-test the platform image
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          config_dir="$RUNNER_TEMP/hub-config-${{ matrix.arch }}"
          mkdir -p "$config_dir/db" "$config_dir/logs"
          chmod -R 0777 "$config_dir"
          docker pull --platform '${{ matrix.platform }}' "$IMAGE@$DIGEST"
          container_id=$(docker run --detach --platform '${{ matrix.platform }}' \
            --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --volume "$config_dir:/app/config" \
            --publish 127.0.0.1::5055 "$IMAGE@$DIGEST")
          trap 'docker logs "$container_id" || true; docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          port=$(docker port "$container_id" 5055/tcp | awk -F: '{print $NF}')
          for attempt in $(seq 1 60); do
            if curl --fail --silent "http://127.0.0.1:${port}/api/v1/status" >/dev/null; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "$container_id" | grep -qx true; then
              exit 1
            fi
            sleep 2
          done
          echo 'Container health endpoint did not become ready' >&2
          exit 1

      - name: Export platform digest
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 7

  publish-candidate:
    name: Assemble, scan, attest, and sign candidate
    needs: [authorize, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
      candidate_tag: ${{ steps.manifest.outputs.candidate_tag }}
    steps:
      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create candidate manifest
        id: manifest
        shell: bash
        env:
          SHORT_SHA: ${{ needs.authorize.outputs.short_sha }}
        run: |
          candidate_tag="candidate-$SHORT_SHA"
          sources=()
          while IFS= read -r digest_file; do
            sources+=("$IMAGE@sha256:$(basename "$digest_file")")
          done < <(find "$RUNNER_TEMP/digests" -type f | sort)
          if [[ ${#sources[@]} -ne 2 ]]; then
            echo "Expected two platform digests, found ${#sources[@]}" >&2
            exit 1
          fi
          docker buildx imagetools create --tag "$IMAGE:$candidate_tag" "${sources[@]}"
          digest=$(docker buildx imagetools inspect "$IMAGE:$candidate_tag" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "candidate_tag=$candidate_tag" >> "$GITHUB_OUTPUT"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.72.0

      - name: Fail on fixable high or critical vulnerabilities
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: >-
          trivy image --exit-code 1 --ignore-unfixed
          --severity HIGH,CRITICAL "$IMAGE@$DIGEST"

      - name: Generate CycloneDX SBOM
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: trivy image --format cyclonedx --output paintedclouds-hub.cdx.json "$IMAGE@$DIGEST"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign candidate digest and attest SBOM
        env:
          COSIGN_YES: 'true'
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign "$IMAGE@$DIGEST"
          cosign attest --type cyclonedx --predicate paintedclouds-hub.cdx.json "$IMAGE@$DIGEST"

      - name: Verify candidate signature
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign verify "$IMAGE@$DIGEST" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release-candidate.yml@refs/heads/main" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-candidate-${{ needs.authorize.outputs.short_sha }}
          path: paintedclouds-hub.cdx.json
          if-no-files-found: error
          retention-days: 90
