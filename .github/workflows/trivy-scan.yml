---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Published Image Scan

on:
  schedule:
    - cron: '41 5 * * 3'
  workflow_dispatch:
    inputs:
      image_ref:
        description: GHCR tag or digest; defaults to the alpha channel
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan published image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Resolve image reference
        id: image
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.image_ref }}
          DEFAULT_REF: ghcr.io/${{ github.repository }}:alpha
        run: |
          image_ref=${REQUESTED_REF:-$DEFAULT_REF}
          if [[ "$image_ref" != ghcr.io/${{ github.repository }}:* && \
                "$image_ref" != ghcr.io/${{ github.repository }}@sha256:* ]]; then
            echo 'Only this repository GHCR package may be scanned' >&2
            exit 1
          fi
          echo "ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Scan image and produce SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy.sarif
