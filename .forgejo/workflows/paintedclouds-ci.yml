name: PaintedClouds Hub CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: paintedclouds-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: hub-ci
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false
      - name: Enable the pinned pnpm version
        run: corepack enable
      - name: Install dependencies
        env:
          CI: 'true'
          CYPRESS_INSTALL_BINARY: '0'
        run: pnpm install --frozen-lockfile
      - name: Formatting
        run: pnpm format:check
      - name: TypeScript
        run: pnpm typecheck
      - name: Unit tests
        env:
          CI: 'true'
        run: pnpm test
      - name: Production build
        run: pnpm build

  image:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: validate
    runs-on: hub-ci
    env:
      DOCKER_API_VERSION: '1.44'
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install the Docker client
        run: |
          apt-get update -qq
          apt-get install --no-install-recommends -y docker.io
      - name: Authenticate to the private Forgejo registry
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: echo "$FORGEJO_TOKEN" | docker login git.paintedclouds.com --username "${{ forgejo.actor }}" --password-stdin
      - name: Build and publish immutable image
        env:
          DOCKER_BUILDKIT: '1'
          IMAGE_SHA: git.paintedclouds.com/kardo/paintedclouds-hub:${{ forgejo.sha }}
          IMAGE_EDGE: git.paintedclouds.com/kardo/paintedclouds-hub:edge
        run: |
          docker build --build-arg COMMIT_TAG="${{ forgejo.sha }}" --tag "$IMAGE_SHA" --tag "$IMAGE_EDGE" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_EDGE"
